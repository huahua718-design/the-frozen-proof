<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>The Frozen Proof - 記憶流痕 (單機版 - 象限中央鏡像)</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root { --accent: #deff9a; --bg: #000; }
        body { font-family: 'Urbanist', sans-serif; background-color: var(--bg); color: #fff; margin: 0; overflow: hidden; height: 100vh; }
        
        html, body { position: fixed; width: 100%; height: 100%; overflow: hidden; }

        .btn-magic { background: rgba(255,255,255,0.05); border: 1px solid var(--accent); color: var(--accent); padding: 12px 24px; border-radius: 50px; font-weight: 500; transition: all 0.3s; }
        .btn-magic:active { transform: scale(0.95); background: var(--accent); color: #000; }

        #camera-view { 
            position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 10; 
            transform: scaleX(-1); 
        }

        .viewfinder { 
            position: fixed; inset: 0; z-index: 20; 
            background: transparent;
            display: flex; align-items: center;
            pointer-events: none; transition: opacity 0.5s;
        }

        /* 🌟撲克牌瞄準方框：置於左下象限的中央處 (25%, 75%) */
        .viewfinder-box {
            width: calc(65vw * 0.6666); 
            height: calc(91vw * 0.6666);
            max-width: calc(280px * 0.6666); 
            max-height: calc(392px * 0.6666); 
            border: 2px solid var(--accent); border-radius: 16px;
            box-shadow: 0 0 30px rgba(222, 255, 154, 0.25);
            position: absolute;
            left: 25%; /* 0~50% 象限的中央 */
            top: 75%;  /* 50~100% 象限的中央 */
            transform: translate(-50%, -50%); 
        }
        .viewfinder-box::after {
            content: 'LOCKING TIME...'; position: absolute; top: calc(-35px * 0.6666); left: 0; right: 0;
            text-align: center; color: var(--accent); font-size: calc(11px * 0.6666); letter-spacing: calc(4px * 0.6666);
            animation: pulse 1.8s infinite;
        }

        #photo-canvas { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 30; display: none; }
        
        #gesture-zone { position: fixed; inset: 0; z-index: 100; display: none; background: rgba(0,0,0,0.01); }

        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    </style>
</head>
<body>

<div id="start-screen" class="fixed inset-0 bg-black z-[5000] flex flex-col items-center justify-center cursor-pointer select-none">
    <h1 class="text-3xl font-light tracking-[0.5em] text-white/90 mb-2">記憶流痕</h1>
    <p class="text-xs tracking-widest text-white/30 font-light">TOUCH TO START</p>
</div>

<video id="camera-view" autoplay playsinline muted></video>

<div id="viewer-ui" class="viewfinder" style="display:none;">
    <div class="viewfinder-box"></div>
    
    <div class="fixed bottom-24 right-12 pointer-events-auto">
        <button id="capture-btn" class="btn-magic text-xl px-6 py-4 shadow-xl">
            <i class="fa-solid fa-camera"></i> 
        </button>
    </div>
</div>

<div id="countdown-overlay" class="fixed inset-0 z-40 flex items-center justify-center bg-black/20 text-8xl font-bold select-none pointer-events-none hidden" style="color: var(--accent);">
    3
</div>

<canvas id="photo-canvas"></canvas>

<div id="gesture-zone"></div>

<div id="status-dot" style="position: fixed; bottom: 20px; left: 20px; width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.02); z-index: 120; pointer-events: none; transition: background 0.3s;"></div>

<script>
    let strokes = [];
    let receivedCardName = null;
    let isCaptured = false;
    let readyForFinalClick = false; 

    const startScreen = document.getElementById('start-screen');
    const video = document.getElementById('camera-view');
    const viewerUi = document.getElementById('viewer-ui');
    const captureBtn = document.getElementById('capture-btn');
    const countdownOverlay = document.getElementById('countdown-overlay');
    const canvas = document.getElementById('photo-canvas');
    const gestureZone = document.getElementById('gesture-zone');
    const dot = document.getElementById('status-dot');

    let localCapturedRawBase64 = null;

    startScreen.addEventListener('click', async () => {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: 'user', width: { ideal: 1920 }, height: { ideal: 1080 } }, 
                audio: false 
            });
            video.srcObject = stream;
            
            startScreen.style.display = 'none';
            viewerUi.style.display = 'flex';
        } catch (err) {
            alert("此魔術需要開啟前置鏡頭權限方能進行。");
        }
    });

    captureBtn.onclick = () => {
        if ('wakeLock' in navigator) navigator.wakeLock.request('screen').catch(()=>{});
        
        captureBtn.disabled = true;
        countdownOverlay.classList.remove('hidden');
        
        let count = 3;
        countdownOverlay.innerText = count;
        
        const timer = setInterval(() => {
            count--;
            if (count > 0) {
                countdownOverlay.innerText = count;
            } else {
                clearInterval(timer);
                countdownOverlay.classList.add('hidden');
                executeCameraCapture();
            }
        }, 1000);
    };

    function executeCameraCapture() {
        const dpr = window.devicePixelRatio || 1;
        canvas.width = window.innerWidth * dpr;
        canvas.height = window.innerHeight * dpr;
        const ctx = canvas.getContext('2d');
        
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.translate(canvas.width, 0);
        ctx.scale(-1, 1);
        
        const vW = video.videoWidth;
        const vH = video.videoHeight;
        const canvasRatio = canvas.width / canvas.height;
        const videoRatio = vW / vH;
        
        let dW, dH, sX, sY;
        if (videoRatio > canvasRatio) {
            dH = canvas.height;
            dW = canvas.height * videoRatio;
            sX = (canvas.width - dW) / 2;
            sY = 0;
        } else {
            dW = canvas.width;
            dH = canvas.width / videoRatio;
            sX = 0;
            sY = (canvas.height - dH) / 2;
        }
        
        ctx.drawImage(video, sX, sY, dW, dH);
        localCapturedRawBase64 = canvas.toDataURL('image/jpeg', 0.95);
        ctx.setTransform(1, 0, 0, 1, 0, 0); 
        
        const boxDom = document.querySelector('.viewfinder-box');
        const boxRect = boxDom.getBoundingClientRect(); 
        
        window.domInfoPercent = {
            domAlignXPercent: boxRect.left * dpr / canvas.width, 
            domAlignYPercent: boxRect.top * dpr / canvas.height, 
            domWidthPercent: boxRect.width * dpr / canvas.width, 
            domHeightPercent: boxRect.height * dpr / canvas.height 
        };
        
        canvas.style.display = 'block';
        viewerUi.style.opacity = '0';
        setTimeout(() => viewerUi.style.display = 'none', 500);
        
        if (video.srcObject) {
            video.srcObject.getTracks().forEach(track => track.stop());
        }

        isCaptured = true;
        gestureZone.style.display = 'block';
        initGestureEngine();
    }

    function initGestureEngine() {
        let startX, startY;

        gestureZone.addEventListener('touchstart', (e) => {
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
        }, { passive: true });

        gestureZone.addEventListener('touchend', (e) => {
            const endX = e.changedTouches[0].clientX;
            const endY = e.changedTouches[0].clientY;
            
            const dx = endX - startX;
            const dy = endY - startY;
            const dist = Math.sqrt(dx*dx + dy*dy);

            if (readyForFinalClick && dist < 15) {
                gestureZone.style.display = 'none'; 
                executeVisualSynthesis(receivedCardName);
                return;
            }

            if (!readyForFinalClick && dist > 30) {
                const strokeProps = calculateQuadrantStrokeProperties(startX, startY, dx, dy);
                strokes.push(strokeProps);
                
                if (strokes.length === 1) {
                    dot.style.background = 'rgba(222, 255, 154, 0.2)'; 
                } else if (strokes.length === 2) {
                    dot.style.background = 'rgba(255, 255, 255, 0.02)'; 
                    decodeMagicCard(strokes);
                    strokes = []; 
                }
            }
        }, { passive: true });
    }

    window.addEventListener('dblclick', (e) => {
        if (isCaptured && !readyForFinalClick) {
            e.preventDefault();
            receivedCardName = "joker_black";
            readyForFinalClick = true;
            dot.style.background = 'rgba(222, 255, 154, 0.3)'; 
        }
    });

    function calculateQuadrantStrokeProperties(startX, startY, dx, dy) {
        const w = window.innerWidth;
        const h = window.innerHeight;
        
        let startQ = 1;
        if (startX < w / 2 && startY < h / 2) startQ = 1;
        else if (startX >= w / 2 && startY < h / 2) startQ = 2;
        else if (startX >= w / 2 && startY >= h / 2) startQ = 3;
        else if (startX < w / 2 && startY >= h / 2) startQ = 4;

        let edge = 0; let dir = 1;  
        const absX = Math.abs(dx);
        const absY = Math.abs(dy);

        if (startQ === 1) {
            if (absX > absY) { edge = 1; dir = (dx > 0) ? 1 : -1; } 
            else             { edge = 0; dir = (dy > 0) ? -1 : 1; } 
        } else if (startQ === 2) {
            if (absX > absY) { edge = 1; dir = (dx > 0) ? 1 : -1; } 
            else             { edge = 2; dir = (dy > 0) ? 1 : -1; } 
        } else if (startQ === 3) {
            if (absX > absY) { edge = 3; dir = (dx < 0) ? 1 : -1; } 
            else             { edge = 2; dir = (dy > 0) ? 1 : -1; } 
        } else if (startQ === 4) {
            if (absX > absY) { edge = 3; dir = (dx < 0) ? 1 : -1; } 
            else             { edge = 0; dir = (dy < 0) ? 1 : -1; } 
        }
        return { edge, dir };
    }

    function decodeMagicCard(s) {
        let suitIdx = s[0].edge; 
        let isSecondHalf = (s[0].dir === -1); 
        let cardValueOffset = 0;
        
        if (s[1].edge === s[0].edge) {
            cardValueOffset = 12; 
        } else {
            const relQuadrant = (s[1].edge - s[0].edge + 4) % 4; 
            cardValueOffset = (isSecondHalf ? 6 : 0) + (relQuadrant - 1) * 2 + (s[1].dir === 1 ? 0 : 1);
        }
        
        const suits = ['club', 'diamond', 'heart', 'spade'];
        const values = ['2', '3', '4', '5', '6', '7', '8', '9', '10', 'jack', 'queen', 'king', '1'];
        
        receivedCardName = `${suits[suitIdx]}_${values[cardValueOffset]}`;
        readyForFinalClick = true; 
    }

    /** [5] 階段四：影像正片疊底渲染與鏡像顯影 **/
    function executeVisualSynthesis(cardName) {
        const ctx = canvas.getContext('2d');
        const bgImg = new Image();
        bgImg.src = localCapturedRawBase64;
        
        bgImg.onload = () => {
            const cardImg = new Image();
            cardImg.src = `./cards/${cardName}.png`; 
            
            cardImg.onload = () => {
                let opacity = 0;
                const animateRendering = () => {
                    opacity += 0.004; 
                    
                    ctx.setTransform(1, 0, 0, 1, 0, 0); 
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(bgImg, 0, 0); 
                    
                    ctx.save();
                    ctx.globalAlpha = Math.min(opacity, 1);
                    ctx.globalCompositeOperation = 'multiply'; 
                    
                    const cardWidth = canvas.width * window.domInfoPercent.domWidthPercent * 0.95; 
                    const cardHeight = canvas.height * window.domInfoPercent.domHeightPercent * 0.95; 
                    
                    const boxCenterX = canvas.width * (window.domInfoPercent.domAlignXPercent + window.domInfoPercent.domWidthPercent / 2);
                    const boxCenterY = canvas.height * (window.domInfoPercent.domAlignYPercent + window.domInfoPercent.domHeightPercent / 2);
                    
                    const targetX = boxCenterX - (cardWidth / 2); 
                    const targetY = boxCenterY - (cardHeight / 2); 
                    
                    // 🌟 核心修改：針對撲克牌影像執行鏡像轉換
                    // 1. 將座標原點移至撲克牌的中心
                    ctx.translate(targetX + cardWidth / 2, 0);
                    // 2. 執行水平翻轉 (scale -1)
                    ctx.scale(-1, 1);
                    
                    // 3. 繪製影像，此時座標原點在牌中心，所以 x 要向左移半個牌寬
                    ctx.drawImage(cardImg, -cardWidth / 2, targetY, cardWidth, cardHeight);
                    
                    ctx.restore();

                    if (opacity < 1) {
                        requestAnimationFrame(animateRendering);
                    } else {
                        finalizeImage();
                    }
                };
                animateRendering();
            };

            cardImg.onerror = () => {
                let opacity = 0;
                const animateFallback = () => {
                    opacity += 0.01;
                    ctx.setTransform(1, 0, 0, 1, 0, 0);
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(bgImg, 0, 0);
                    
                    ctx.save();
                    ctx.globalAlpha = Math.min(opacity, 1);
                    
                    const cardWidth = canvas.width * window.domInfoPercent.domWidthPercent * 0.95;
                    const cardHeight = canvas.height * window.domInfoPercent.domHeightPercent * 0.95;
                    const boxCenterX = canvas.width * (window.domInfoPercent.domAlignXPercent + window.domInfoPercent.domWidthPercent / 2);
                    const boxCenterY = canvas.height * (window.domInfoPercent.domAlignYPercent + window.domInfoPercent.domHeightPercent / 2);
                    const targetX = boxCenterX - (cardWidth / 2);
                    const targetY = boxCenterY - (cardHeight / 2);

                    // 🌟 核心修改：針對程式繪製的備份方案也執行鏡像轉換
                    ctx.translate(targetX + cardWidth / 2, 0);
                    ctx.scale(-1, 1);
                    
                    // 定義相對於轉換後中心的繪製起始點
                    const drawOriginX = -cardWidth / 2;

                    ctx.fillStyle = "#ffffff";
                    ctx.shadowColor = "rgba(0,0,0,0.4)";
                    ctx.shadowBlur = 15;
                    ctx.beginPath();
                    ctx.roundRect(drawOriginX, targetY, cardWidth, cardHeight, 14);
                    ctx.fill();
                    
                    ctx.fillStyle = cardName.includes('heart') || cardName.includes('diamond') ? '#dc2626' : '#0f172a';
                    ctx.font = `bold ${cardWidth * 0.14}px Arial`;
                    ctx.textAlign = "center";
                    ctx.textBaseline = "middle";
                    
                    if (cardName === "joker_black") {
                        ctx.fillStyle = '#1e293b';
                        // 文字座標也要相對於轉換後的中心
                        ctx.fillText("JOKER", drawOriginX + cardWidth/2, targetY + cardHeight/2);
                    } else {
                        ctx.fillText(cardName.split('_')[1].toUpperCase(), drawOriginX + cardWidth/2, targetY + cardHeight/2);
                    }
                    ctx.restore();

                    if (opacity < 1) { requestAnimationFrame(animateFallback); } 
                    else { finalizeImage(); }
                };
                animateFallback();
            };
        };
    }

    function finalizeImage() {
        const finalDataURL = canvas.toDataURL('image/jpeg', 0.95);
        const nativeImg = document.createElement('img');
        nativeImg.src = finalDataURL;
        nativeImg.className = "fixed inset-0 w-full h-full object-cover z-[2000]";
        document.body.appendChild(nativeImg);
    }
</script>

</body>
</html>
