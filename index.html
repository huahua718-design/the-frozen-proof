<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>The Frozen Proof - 智能顯影版</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script async src="https://docs.opencv.org/4.5.4/opencv.js" id="opencv-js"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root { --accent: #deff9a; --bg: #000; }
        body { font-family: 'Urbanist', sans-serif; background-color: var(--bg); color: #fff; margin: 0; overflow: hidden; height: 100vh; touch-action: none; user-select: none; -webkit-user-select: none; }
        html, body { position: fixed; width: 100%; height: 100%; overflow: hidden; }

        /* 魔術按鈕樣式 */
        .btn-magic { background: rgba(0,0,0,0.6); border: 2px solid var(--accent); color: var(--accent); padding: 14px 28px; border-radius: 50px; font-weight: 500; backdrop-filter: blur(5px); box-shadow: 0 0 20px rgba(222, 255, 154, 0.2); }

        /* 全螢幕相機預覽 (修正 1: 改成前置鏡頭需水平鏡像) */
        #camera-view { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 10; transform: scaleX(-1); /* 自拍需鏡像 */ }

        /* 最終靜態照片與顯影畫布 */
        #photo-canvas { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 30; display: none; }
        
        /* 科技追蹤框 UI (在 OpenCV 初始化前顯示) */
        .viewfinder { position: fixed; inset: 0; z-index: 20; display: flex; align-items: center; justify-content: center; pointer-events: none; transition: opacity 0.5s; }
        #openCvStatus { position: fixed; bottom: 100px; left: 0; right: 0; text-align: center; color: var(--accent); font-size: 11px; z-index: 21; letter-spacing: 3px; }

        /* 魔術師盲操觸控與 UI 層 */
        #gesture-zone { position: fixed; inset: 0; z-index: 100; display: none; background: rgba(0,0,0,0.01); }
        #master-ui { position: fixed; inset: 0; z-index: 110; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; text-align: center; }
        .toast { position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); border: 1px solid var(--accent); color: var(--accent); padding: 12px 24px; border-radius: 50px; z-index: 200; pointer-events: none; opacity: 0; transition: opacity 0.3s; font-size: 14px; }
    </style>
</head>
<body>

<video id="camera-view" autoplay playsinline muted></video>
<div id="openCvStatus" class="animate-pulse">初始化量子追蹤中...</div>
<div id="viewer-ui" class="viewfinder" style="display:none;">
    <div class="fixed bottom-12 left-0 right-0 flex justify-center pointer-events-auto">
        <button id="capture-btn" class="btn-magic text-lg px-10 animate-pulse">
            <i class="fa-solid fa-camera mr-2"></i> 觸碰定格顯影
        </button>
    </div>
</div>

<canvas id="photo-canvas"></canvas>

<div id="master-ui" style="display:none;">
    <div class="mb-8">
        <h2 class="text-3xl font-bold mb-2">ROOM: <span id="room-id-display" class="text-accent tracking-wider">----</span></h2>
        <p class="text-white/50 text-sm">請引導觀眾掃描上方條碼連線</p>
    </div>
    <div id="qrcode-container" class="bg-white p-5 rounded-3xl mb-8 shadow-2xl">
        <img id="qrcode-img" src="" alt="QR Code" class="w-60 h-60">
    </div>
    <p class="animate-pulse text-accent/80 text-sm tracking-wide">雙擊螢幕：隱藏此畫面 / 開始盲操輸入</p>
</div>

<div id="gesture-zone"></div>
<div id="toast" class="toast"><i class="fa-solid fa-wifi mr-2"></i>思想密碼已同步</div>

<script>
    /** [1] FIREBASE 環境設定 (完全使用你的專案金鑰與亞洲節點) **/
    const firebaseConfig = {
        apiKey: "AIzaSyCjTKS43McbUswz3afjcQpPjamhoMb-X9c",
        authDomain: "magic-card-app-2f24f.firebaseapp.com",
        databaseURL: "https://magic-card-app-2f24f-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "magic-card-app-2f24f",
        storageBucket: "magic-card-app-2f24f.firebasestorage.app",
        messagingSenderId: "900697689478",
        appId: "1:900697689478:web:38a5aba747e96a7fcb3007"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    /** [2] 系統路由與變數 **/
    const urlParams = new URLSearchParams(window.location.search);
    const mode = urlParams.get('mode'); 
    const roomFromUrl = urlParams.get('room');
    let currentRoom = roomFromUrl || "9527"; // 預設使用你習慣的 9527
    let isMaster = (mode === 'master');

    const EDGE = { LEFT: 0, TOP: 1, RIGHT: 2, BOTTOM: 3 };
    let strokes = [];
    let openCvReady = false;
    let trackedPoints = null; // 用於儲存 OpenCV 計算出的紙牌四個角落

    // OpenCV 初始化完成後觸發
    document.getElementById('opencv-js').addEventListener('load', () => {
        openCvReady = true;
        document.getElementById('openCvStatus').style.display = 'none';
        if (!isMaster) { setupOpenCvTracking(); }
    });

    window.onload = () => {
        if (isMaster) {
            setupMasterMode();
        } else {
            setupViewerMode(currentRoom);
        }
    };

    /** [3] 魔術師控制端邏輯 (Master) **/
    function setupMasterMode() {
        document.getElementById('master-ui').style.display = 'flex';
        document.getElementById('gesture-zone').style.display = 'block';
        document.getElementById('room-id-display').innerText = currentRoom;

        const viewerUrl = `${window.location.origin}${window.location.pathname}?room=${currentRoom}`;
        document.getElementById('qrcode-img').src = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(viewerUrl)}`;

        window.addEventListener('dblclick', (e) => {
            e.preventDefault();
            const ui = document.getElementById('master-ui');
            ui.style.display = (ui.style.display === 'none') ? 'flex' : 'none';
        });

        initGestureEngine();
    }

    function initGestureEngine() {
        const zone = document.getElementById('gesture-zone');
        let startX, startY;
        zone.addEventListener('touchstart', (e) => {
            startX = e.touches[0].clientX; startY = e.touches[0].clientY;
        }, { passive: true });

        zone.addEventListener('touchend', (e) => {
            const dx = e.changedTouches[0].clientX - startX;
            const dy = e.changedTouches[0].clientY - startY;
            if (Math.sqrt(dx*dx + dy*dy) > 30) {
                const edge = calculateEdgeQuadrant(startX, startY);
                const dir = calculateStrokeDirection(edge, dx, dy);
                strokes.push({ edge, dir });
                if (strokes.length === 2) {
                    decodeAndSendMagic(strokes);
                    strokes = [];
                }
            }
        }, { passive: true });
    }

    function calculateEdgeQuadrant(x, y) {
        const w = window.innerWidth, h = window.innerHeight;
        if (x < w * 0.3) return EDGE.LEFT;
        if (y < h * 0.3) return EDGE.TOP;
        if (x > w * 0.7) return EDGE.RIGHT;
        return EDGE.BOTTOM;
    }

    function calculateStrokeDirection(edge, dx, dy) {
        if (edge === EDGE.LEFT) return dy < 0 ? 1 : -1;
        if (edge === EDGE.TOP) return dx > 0 ? 1 : -1;
        if (edge === EDGE.RIGHT) return dy > 0 ? 1 : -1;
        return dx < 0 ? 1 : -1;
    }

    function decodeAndSendMagic(s) {
        let suitIdx = s[0].edge;
        let isSecondHalf = (s[0].dir === -1);
        let cardValueOffset = 0;
        if (s[1].edge === s[0].edge) {
            cardValueOffset = 12; // A
        } else {
            const relQuadrant = (s[1].edge - s[0].edge + 4) % 4;
            cardValueOffset = (isSecondHalf ? 6 : 0) + (relQuadrant - 1) * 2 + (s[1].dir === 1 ? 0 : 1);
        }
        const suits = ['club', 'diamond', 'heart', 'spade'];
        const values = ['2', '3', '4', '5', '6', '7', '8', '9', '10', 'jack', 'queen', 'king', '1'];
        
        db.ref(`twatch_rooms/${currentRoom}`).update({
            forcedCard: `${suits[suitIdx]}_${values[cardValueOffset]}`,
            timestamp: Date.now()
        }).then(() => triggerToast());
    }

    function triggerToast() {
        const t = document.getElementById('toast');
        t.style.opacity = '1';
        setTimeout(() => t.style.opacity = '0', 1500);
    }

    /** [4] 觀眾端：智能前置相機追蹤與自拍顯影邏輯 (Viewer) **/
    const video = document.getElementById('camera-view');
    const canvas = document.getElementById('photo-canvas');
    const captureBtn = document.getElementById('capture-btn');
    const viewerUi = document.getElementById('viewer-ui');
    
    let localCapturedRawBase64 = null;
    let isMagicExecuted = false;
    let trackedQuad = null; // 用於儲存拍照定格時的追蹤坐標

    async function setupViewerMode(roomId) {
        // 修正點 1: 改成前置鏡頭 (自拍模式)
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: 'user', width: { ideal: 1920 }, height: { ideal: 1080 } }, 
                audio: false 
            });
            video.srcObject = stream;
        } catch (err) {
            alert("請允許相機鏡頭存取權限，否則無法與心靈感應連線。");
        }

        db.ref(`twatch_rooms/${roomId}`).on('value', (snapshot) => {
            const data = snapshot.val();
            // 當收到牌，且相機已定格，且尚未執行過顯影
            if (data && data.forcedCard && localCapturedRawBase64 && !isMagicExecuted) {
                isMagicExecuted = true;
                executeVisualSynthesis(data.forcedCard);
            }
        });

        captureBtn.onclick = () => {
            if ('wakeLock' in navigator) navigator.wakeLock.request('screen').catch(()=>{});
            executeCameraCapture();
        };
    }

    // 🔥 全新核心：OpenCV.js 智能紙牌追蹤引擎
    // 這會在影片流中持續尋找具有卡牌特徵的四邊形
    function setupOpenCvTracking() {
        if (!openCvReady || isMagicExecuted) return;
        
        viewerUi.style.display = 'flex';
        
        const cap = new cv.VideoCapture(video);
        const frame = new cv.Mat(video.videoHeight, video.videoWidth, cv.CV_8UC4);
        const gray = new cv.Mat();
        const contours = new cv.MatVector();
        const hierarchy = new cv.Mat();
        const hull = new cv.Mat();

        const processVideo = () => {
            try {
                if (!isTrackingMode() || isMagicExecuted) {
                    // 如果已定格或魔術已執行，清理 Mat 並退出
                    frame.delete(); gray.delete(); contours.delete(); hierarchy.delete(); hull.delete();
                    return;
                }
                
                cap.read(frame);
                
                // 1. 圖像預處理：轉灰階、高斯模糊、Canny 邊緣檢測
                cv.cvtColor(frame, gray, cv.COLOR_RGBA2GRAY);
                cv.GaussianBlur(gray, gray, new cv.Size(5, 5), 0);
                cv.Canny(gray, gray, 75, 200, 3);
                
                // 2. 膨脹邊緣以連接斷點
                cv.dilate(gray, gray, cv.getStructuringElement(cv.MORPH_RECT, new cv.Size(3, 3)));

                // 3. 尋找輪廓
                cv.findContours(gray, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

                let maxArea = 0;
                let bestApprox = null;

                for (let i = 0; i < contours.size(); ++i) {
                    const cnt = contours.get(i);
                    const area = cv.contourArea(cnt);
                    
                    // 過濾過小區域，並確保區域是凸的 (具有白牌特徵)
                    if (area < 30000 || !cv.isContourConvex(cnt)) continue;

                    // 4. 計算輪廓周長並進行多邊形逼近
                    const peri = cv.arcLength(cnt, true);
                    const approx = new cv.Mat();
                    cv.approxPolyDP(cnt, approx, 0.04 * peri, true);

                    // 5. 判斷逼近結果是否為四邊形，且為畫面中最大的一個
                    if (approx.rows === 4 && area > maxArea) {
                        maxArea = area;
                        if (bestApprox) bestApprox.delete(); // 刪除之前的最佳
                        bestApprox = approx; // 儲存新的最佳
                    } else {
                        approx.delete();
                    }
                }

                // 如果找到最佳四邊形，提取其頂點坐標
                if (bestApprox) {
                    const pts = [];
                    for (let j = 0; j < 4; j++) {
                        pts.push({ x: bestApprox.data32S[j * 2], y: bestApprox.data32S[j * 2 + 1] });
                    }
                    bestApprox.delete(); // 清理

                    // 儲存全局坐標，供拍照時定格
                    trackedPoints = pts;
                    
                    // 可選：如果你需要在追蹤中顯示綠色光框，可以在此實作 Canvas 繪製，但由於自拍需鏡像，邏輯需修正。此處先不繪製以保持畫面乾淨
                } else {
                    trackedPoints = null; // 未抓到
                }

                requestAnimationFrame(processVideo);
            } catch (err) {
                console.error("量子追蹤發生異常，魔術繼續進行:", err);
                requestAnimationFrame(processVideo);
            }
        };

        requestAnimationFrame(processVideo);
    }

    function isTrackingMode() {
        return video.style.display !== 'none';
    }

    function executeCameraCapture() {
        if (!trackedPoints) {
            // 安全機制：如果按下定格時 OpenCV 沒抓到白牌 (例如完全失焦或被整隻手遮住)，給予一個預設的中央坐標防止穿幫
            const w = video.videoWidth; const h = video.videoHeight;
            const cWidth = w * 0.42; const cHeight = cWidth * 1.42;
            trackedQuad = [
                { x: (w - cWidth) / 2, y: (h - cHeight) / 2 }, // 左上
                { x: (w + cWidth) / 2, y: (h - cHeight) / 2 }, // 右上
                { x: (w + cWidth) / 2, y: (h + cHeight) / 2 }, // 右下
                { x: (w - cWidth) / 2, y: (h + cHeight) / 2 }  // 左下
            ];
        } else {
            // 將追蹤點進行頂點排序：左上、右上、右下、左下，以便之後的四點透視變換
            trackedQuad = sortPoints(trackedPoints);
        }

        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        
        // 將視訊畫面水平鏡像繪製到畫布上 (自拍需鏡像)
        ctx.save();
        ctx.translate(canvas.width, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        ctx.restore();
        
        localCapturedRawBase64 = canvas.toDataURL('image/jpeg', 0.95);
        
        // 畫面切換：關閉視訊、顯示 Canvas
        canvas.style.display = 'block';
        video.style.display = 'none';
        viewerUi.style.opacity = '0';
        setTimeout(() => viewerUi.style.display = 'none', 500);

        // 關閉攝影機
        if (video.srcObject) {
            video.srcObject.getTracks().forEach(track => track.stop());
        }
    }

    // 🔥 重寫的核心功能：商業級圖像融合與顯影系統 (修正 2: 與追蹤框對齊)
    function executeVisualSynthesis(cardName) {
        const ctx = canvas.getContext('2d');
        const bgImg = new Image();
        bgImg.src = localCapturedRawBase64;
        
        bgImg.onload = () => {
            const cardImg = new Image();
            // 對接本地路徑 `./cards/xxx_xxx.png`
            cardImg.src = `./cards/${cardName}.png`; 
            
            cardImg.onload = () => {
                let opacity = 0;
                
                // 10秒顯現動畫引擎
                const animateRendering = () => {
                    opacity += 0.002; 
                    
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    // 1. 重新繪製底部包含手指的真實照片
                    ctx.drawImage(bgImg, 0, 0);
                    
                    // 2. 利用定格時的追蹤點，將扑克牌進行四點透視變換 (Perspective Transform)
                    ctx.save();
                    
                    // 🌟 核心混合模式：使用 multiply (正片疊底)，原牌背的紋理與手指邊緣的陰影會自然融合進虛擬預言牌中，效果極度真實！
                    ctx.globalCompositeOperation = 'multiply';
                    ctx.globalAlpha = Math.min(opacity, 1);
                    
                    // 執行透視變換渲染
                    drawTransformedImage(ctx, cardImg, trackedQuad);
                    
                    ctx.restore();

                    if (opacity < 1) {
                        requestAnimationFrame(animateRendering);
                    } else {
                        finalizeAndInjectNativeImage();
                    }
                };
                animateRendering();
            };
            
            // 本地圖檔防呆機制
            cardImg.onerror = () => {
                alert("時空連結失敗，可能是量子糾纏圖檔丟失(" + cardName + ")。");
            };
        };
    }

    /** 🧮 高階射影幾何變換矩陣 (Homography) 運算 **/
    // 利用四張圖的頂點坐標，計算 Homography 矩陣，並將圖形精準投影到目標區域
    function drawTransformedImage(ctx, img, quad) {
        // 因自拍鏡像， trackedQuad 坐標需轉換為非鏡像畫布坐標
        const w = canvas.width;
        const pts = quad.map(p => ({ x: w - p.x, y: p.y })); // 水平反轉坐標

        // 計算逆向 Homography 矩陣，用於將 Canvas 的每一點映射回撲克牌原圖
        function adj(m) {
            return [
                m[4]*m[8]-m[5]*m[7], m[2]*m[7]-m[1]*m[8], m[1]*m[5]-m[2]*m[4],
                m[5]*m[6]-m[3]*m[8], m[0]*m[8]-m[2]*m[6], m[2]*m[3]-m[0]*m[5],
                m[3]*m[7]-m[4]*m[6], m[1]*m[6]-m[0]*m[7], m[0]*m[4]-m[1]*m[3]
            ];
        }
        function mult(a, b) {
            let c = Array(9);
            for (let i=0; i<3; i++) {
                for (let j=0; j<3; j++) {
                    let s = 0; for (let k=0; k<3; k++) s += a[i*3+k]*b[k*3+j];
                    c[i*3+j] = s;
                }
            }
            return c;
        }
        function getTransform(x0, y0, x1, y1, x2, y2, x3, y3) {
            let w = img.width, h = img.height;
            let t = [x0,y0,1, x1,y1,1, x2,y2,1];
            let m = adj([0,0,1, w,0,1, 0,h,1]);
            let res = mult(t, m);
            return [res[0]/res[8], res[3]/res[8], res[1]/res[8], res[4]/res[8], res[2]/res[8], res[5]/res[8]];
        }

        // 應用變換並繪製 (使用其剪裁區以防止超出邊界)
        ctx.save();
        ctx.beginPath();
        ctx.moveTo(pts[0].x, pts[0].y); ctx.lineTo(pts[1].x, pts[1].y);
        ctx.lineTo(pts[2].x, pts[2].y); ctx.lineTo(pts[3].x, pts[3].y);
        ctx.closePath();
        ctx.clip(); // 建立裁切區

        let xt = getTransform(pts[0].x, pts[0].y, pts[1].x, pts[1].y, pts[3].x, pts[3].y, pts[2].x, pts[2].y);
        ctx.transform(xt[0], xt[1], xt[2], xt[3], xt[4], xt[5]);
        ctx.drawImage(img, 0, 0);
        ctx.restore();
    }

    // 將四點坐標排序為 左上、右上、右下、左下
    function sortPoints(points) {
        points.sort((a, b) => a.x - b.x); // 按 x 排序
        let leftSide = [points[0], points[1]].sort((a, b) => a.y - b.y); // 左側兩點按 y 排序
        let rightSide = [points[2], points[3]].sort((a, b) => a.y - b.y); // 右側兩點按 y 排序
        return [
            leftSide[0],   // 左上
            rightSide[0],  // 右上
            rightSide[1],  // 右下
            leftSide[1]    // 左下
        ];
    }

    // 打包長按儲存
    function finalizeAndInjectNativeImage() {
        const finalDataURL = canvas.toDataURL('image/jpeg', 0.95);
        const nativeImg = document.createElement('img');
        nativeImg.src = finalDataURL;
        nativeImg.className = "fixed inset-0 w-full h-full object-cover z-[2000]";
        document.body.appendChild(nativeImg);
    }
</script>

</body>
</html>
