<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>The Frozen Proof - 陰影感影版</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root { --accent: #deff9a; --bg: #000; }
        body { font-family: 'Urbanist', sans-serif; background-color: var(--bg); color: #fff; margin: 0; overflow: hidden; height: 100vh; }
        
        /* 鎖定視窗，避免 iOS 瀏覽器彈性回彈 */
        html, body { position: fixed; width: 100%; height: 100%; overflow: hidden; }

        /* 魔術按鈕樣式 */
        .btn-magic { background: rgba(0,0,0,0.6); border: 1px solid var(--accent); color: var(--accent); padding: 14px 28px; border-radius: 50px; font-weight: 500; transition: all 0.3s; backdrop-filter: blur(8px); }
        .btn-magic:active { transform: scale(0.95); background: var(--accent); color: #000; }

        /* 全螢幕相機預覽（前置鏡頭需水平鏡像翻轉） */
        #camera-view { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 10; transform: scaleX(-1); }

        /* 綠色瞄準框 UI */
        .viewfinder { 
            position: fixed; inset: 0; z-index: 20; 
            border: 40px solid rgba(0,0,0,0.6); 
            display: flex; align-items: center; justify-content: center;
            pointer-events: none; transition: opacity 0.5s;
        }
        .viewfinder-box {
            width: 65vw; height: 91vw; max-width: 280px; max-height: 392px;
            border: 2px solid var(--accent); border-radius: 16px;
            box-shadow: 0 0 30px rgba(222, 255, 154, 0.25);
            position: relative;
        }
        .viewfinder-box::after {
            content: 'READY FOR SELFIE'; position: absolute; top: -35px; left: 0; right: 0;
            text-align: center; color: var(--accent); font-size: 11px; letter-spacing: 4px;
        }

        /* 靜態照片與顯影畫布 */
        #photo-canvas { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 30; display: none; }
        
        /* 魔術師全螢幕隱形觸控層 */
        #gesture-zone { position: fixed; inset: 0; z-index: 100; display: none; background: rgba(0,0,0,0.01); }

        /* 魔術師大廳 UI */
        #master-ui { 
            position: fixed; inset: 0; z-index: 110; 
            background: #000; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; padding: 40px; text-align: center;
        }

        /* 狀態提示 */
        .toast {
            position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.85); border: 1px solid var(--accent); color: var(--accent);
            padding: 14px 28px; border-radius: 50px; z-index: 200; pointer-events: none;
            opacity: 0; transition: opacity 0.4s; font-size: 14px; letter-spacing: 1px;
            text-align: center; white-space: nowrap; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

<video id="camera-view" autoplay playsinline muted></video>

<div id="viewer-ui" class="viewfinder">
    <div class="viewfinder-box"></div>
    <div class="fixed bottom-24 left-0 right-0 flex justify-center pointer-events-auto">
        <button id="capture-btn" class="btn-magic text-lg px-10 shadow-lg">
            <i class="fa-solid fa-camera mr-2"></i> 拍下自拍定格
        </button>
    </div>
</div>

<canvas id="photo-canvas"></canvas>

<div id="master-ui" style="display:none;">
    <div class="mb-8">
        <h2 class="text-3xl font-bold mb-2">ROOM: <span id="room-id-display" class="text-accent tracking-wider">----</span></h2>
        <p class="text-white/50 text-sm">請引導觀眾掃描下方條碼連線</p>
    </div>
    <div id="qrcode-container" class="bg-white p-5 rounded-3xl mb-8 shadow-2xl">
        <img id="qrcode-img" src="" alt="QR Code" class="w-60 h-60">
    </div>
    <p class="animate-pulse text-accent/80 text-sm tracking-wide">雙擊螢幕：隱藏此畫面 / 開始盲操輸入</p>
</div>

<div id="gesture-zone"></div>

<div id="toast" class="toast"></div>

<script>
    /** [1] FIREBASE 環境設定 **/
    const firebaseConfig = {
        apiKey: "AIzaSyCjTKS43McbUswz3afjcQpPjamhoMb-X9c",
        authDomain: "magic-card-app-2f24f.firebaseapp.com",
        databaseURL: "https://magic-card-app-2f24f-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "magic-card-app-2f24f",
        storageBucket: "magic-card-app-2f24f.firebasestorage.app",
        messagingSenderId: "900697689478",
        appId: "1:900697689478:web:38a5aba747e96a7fcb3007"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    /** [2] 系統路由與變數定義 **/
    const urlParams = new URLSearchParams(window.location.search);
    const mode = urlParams.get('mode'); 
    const roomFromUrl = urlParams.get('room');
    let currentRoom = roomFromUrl || "9527"; // 預設使用您的習慣房號
    let isMaster = (mode === 'master');

    const EDGE = { LEFT: 0, TOP: 1, RIGHT: 2, BOTTOM: 3 };
    let strokes = [];

    window.onload = () => {
        if (isMaster) {
            // 初始化時清除舊資料，確保流程乾淨
            db.ref(`twatch_rooms/${currentRoom}`).set({ forcedCard: "", timestamp: 0 });
            setupMasterMode();
        } else {
            setupViewerMode(currentRoom);
        }
    };

    /** [3] 魔術師控制端邏輯 (Master) **/
    function setupMasterMode() {
        document.getElementById('master-ui').style.display = 'flex';
        document.getElementById('gesture-zone').style.display = 'block';
        document.getElementById('room-id-display').innerText = currentRoom;

        const viewerUrl = `${window.location.origin}${window.location.pathname}?room=${currentRoom}`;
        document.getElementById('qrcode-img').src = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(viewerUrl)}`;

        window.addEventListener('dblclick', (e) => {
            e.preventDefault();
            const ui = document.getElementById('master-ui');
            ui.style.display = (ui.style.display === 'flex') ? 'none' : 'flex';
        });

        initGestureEngine();
    }

    function initGestureEngine() {
        const zone = document.getElementById('gesture-zone');
        let startX, startY;

        zone.addEventListener('touchstart', (e) => {
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
        }, { passive: true });

        zone.addEventListener('touchend', (e) => {
            const dx = e.changedTouches[0].clientX - startX;
            const dy = e.changedTouches[0].clientY - startY;
            const dist = Math.sqrt(dx*dx + dy*dy);

            if (dist > 30) {
                const edge = calculateEdgeQuadrant(startX, startY);
                const dir = calculateStrokeDirection(edge, dx, dy);
                strokes.push({ edge, dir });
                
                if (strokes.length === 2) {
                    decodeAndSendMagic(strokes);
                    strokes = [];
                }
            }
        }, { passive: true });
    }

    function calculateEdgeQuadrant(x, y) {
        const w = window.innerWidth, h = window.innerHeight;
        if (x < w * 0.3) return EDGE.LEFT;
        if (y < h * 0.3) return EDGE.TOP;
        if (x > w * 0.7) return EDGE.RIGHT;
        return EDGE.BOTTOM;
    }

    function calculateStrokeDirection(edge, dx, dy) {
        if (edge === EDGE.LEFT) return dy < 0 ? 1 : -1;
        if (edge === EDGE.TOP) return dx > 0 ? 1 : -1;
        if (edge === EDGE.RIGHT) return dy > 0 ? 1 : -1;
        return dx < 0 ? 1 : -1;
    }

    function decodeAndSendMagic(s) {
        let suitIdx = s[0].edge; 
        let isSecondHalf = (s[0].dir === -1);
        let cardValueOffset = 0;
        
        if (s[1].edge === s[0].edge) {
            cardValueOffset = 12; // A
        } else {
            const relQuadrant = (s[1].edge - s[0].edge + 4) % 4;
            cardValueOffset = (isSecondHalf ? 6 : 0) + (relQuadrant - 1) * 2 + (s[1].dir === 1 ? 0 : 1);
        }
        
        const suits = ['club', 'diamond', 'heart', 'spade'];
        const values = ['2', '3', '4', '5', '6', '7', '8', '9', '10', 'jack', 'queen', 'king', '1'];
        const cardCode = `${suits[suitIdx]}_${values[cardValueOffset]}`;

        db.ref(`twatch_rooms/${currentRoom}`).update({
            forcedCard: cardCode,
            timestamp: Date.now()
        }).then(() => triggerToast(`<i class="fa-solid fa-wifi mr-2"></i>思想密碼 [${cardCode}] 已同步`));
    }

    function triggerToast(htmlContent) {
        const t = document.getElementById('toast');
        t.innerHTML = htmlContent;
        t.style.opacity = '1';
        setTimeout(() => t.style.opacity = '0', 2000);
    }


    /** [4] 觀眾端：自拍定格與光感應顯影邏輯 (Viewer) **/
    const video = document.getElementById('camera-view');
    const canvas = document.getElementById('photo-canvas');
    const captureBtn = document.getElementById('capture-btn');
    
    let photoCaptured = false;
    let isMagicExecuted = false;
    let forcedCardName = null;
    let localCapturedRawBase64 = null;

    // 用於背景分析光線的隱藏微型畫布
    const lumaCanvas = document.createElement('canvas');
    lumaCanvas.width = 16;
    lumaCanvas.height = 16;
    const lumaCtx = lumaCanvas.getContext('2d');

    async function setupViewerMode(roomId) {
        // 流程修改 1：設定成「前置鏡頭 (user)」自拍
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: 'user', width: { ideal: 1920 }, height: { ideal: 1080 } }, 
                audio: false 
            });
            video.srcObject = stream;
        } catch (err) {
            alert("請允許網頁相機存取權限，以進行心靈時空連線。");
        }

        // 監聽 Firebase 訊號 (隨時接收魔術師輸入的卡牌)
        db.ref(`twatch_rooms/${roomId}`).on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && data.forcedCard) {
                forcedCardName = data.forcedCard;
            }
        });

        // 流程修改 2：對準綠色框點擊自拍
        captureBtn.onclick = () => {
            if ('wakeLock' in navigator) navigator.wakeLock.request('screen').catch(()=>{});
            executeCameraCapture();
        };
    }

    // 計算拍照框在當前螢幕上的精確 CSS 坐標，以修正卡牌位置與拍照框完全相同
    function getViewfinderRect() {
        const screenW = window.innerWidth;
        const screenH = window.innerHeight;
        let cardW = screenW * 0.65;
        if (cardW > 280) cardW = 280;
        let cardH = cardW * (91 / 65);
        if (cardH > 392) cardH = 392;
        
        return {
            x: (screenW - cardW) / 2,
            y: (screenH - cardH) / 2,
            w: cardW,
            h: cardH
        };
    }

    // 模擬 object-fit: cover 繪製視訊流到畫布上
    function drawVideoCover(ctx, img, w, h) {
        let imgRatio = img.videoWidth / img.videoHeight;
        let screenRatio = w / h;
        let sw, sh, sx, sy;
        if (imgRatio > screenRatio) {
            sh = img.videoHeight; sw = sh * screenRatio;
            sx = (img.videoWidth - sw) / 2; sy = 0;
        } else {
            sw = img.videoWidth; sh = sw / screenRatio;
            sx = 0; sy = (img.videoHeight - sh) / 2;
        }
        ctx.drawImage(img, sx, sy, sw, sh, 0, 0, w, h);
    }

    function executeCameraCapture() {
        const w = window.innerWidth;
        const h = window.innerHeight;
        canvas.width = w;
        canvas.height = h;
        const ctx = canvas.getContext('2d');
        
        // 鏡像翻轉繪製（確保自拍靜態照片與鏡頭看到的完全一致）
        ctx.save();
        ctx.translate(w, 0);
        ctx.scale(-1, 1);
        drawVideoCover(ctx, video, w, h);
        ctx.restore();
        
        localCapturedRawBase64 = canvas.toDataURL('image/jpeg', 0.95);
        photoCaptured = true;

        // 畫面切換：顯示畫布，隱藏拍照 UI
        canvas.style.display = 'block';
        document.getElementById('viewer-ui').style.opacity = '0';
        setTimeout(() => document.getElementById('viewer-ui').style.display = 'none', 500);

        // 💡 關鍵：不可關閉影片流（video物件不隱藏，而是壓在 canvas 底下），以便背景持續感應光線
        video.style.zIndex = "5"; 
        
        // 提示觀眾放下手機
        triggerToast(`<i class="fa-solid fa-mobile-screen mr-2"></i>時空已定格，請將手機平放於桌面`);

        // 啟動前置鏡頭「變暗偵測器」
        requestAnimationFrame(checkBackgroundBrightness);
    }

    // 流程修改 4：背景實時偵測前置鏡頭是否被遮掩變暗
    function checkBackgroundBrightness() {
        if (isMagicExecuted || !photoCaptured) return;

        try {
            // 將視訊流縮小繪製到 16x16 畫布以計算平均亮度
            lumaCtx.drawImage(video, 0, 0, 16, 16);
            const imgData = lumaCtx.getImageData(0, 0, 16, 16);
            const d = imgData.data;
            let totalLuma = 0;

            for (let i = 0; i < d.length; i += 4) {
                // 使用標準明度公式 (Luma)
                totalLuma += (0.299 * d[i] + 0.587 * d[i+1] + 0.114 * d[i+2]);
            }
            let avgBrightness = totalLuma / (16 * 16);

            // 當數值小於 28 (代表手完全遮蔽鏡頭) 且 魔術師已經輸入撲克牌，觸發顯影！
            if (avgBrightness < 28 && forcedCardName) {
                isMagicExecuted = true;
                
                // 停止硬體鏡頭以關閉隱私綠點
                if (video.srcObject) {
                    video.srcObject.getTracks().forEach(track => track.stop());
                }
                
                // 開始顯影動畫
                executeVisualSynthesis(forcedCardName);
                return;
            }
        } catch (e) {
            console.log("偵測中...");
        }

        requestAnimationFrame(checkBackgroundBrightness);
    }

    function executeVisualSynthesis(cardName) {
        const ctx = canvas.getContext('2d');
        const bgImg = new Image();
        bgImg.src = localCapturedRawBase64;
        
        bgImg.onload = () => {
            const cardImg = new Image();
            cardImg.src = `./cards/${cardName}.png`; 
            
            cardImg.onload = () => {
                let opacity = 0;
                const rect = getViewfinderRect(); // 獲取精確拍照框位置
                
                // 漸進顯影動畫引擎（約 3-4 秒）
                const animateRendering = () => {
                    opacity += 0.008; 
                    
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    // 1. 繪製底部原本自拍的照片
                    ctx.drawImage(bgImg, 0, 0);
                    
                    // 2. 疊加虛擬預言牌面
                    ctx.save();
                    ctx.globalAlpha = Math.min(opacity, 1);
                    
                    // 商業級混合：使用正片疊底 (multiply)，原白紙牌上的陰影、顆粒和手指疊加會自然透出
                    ctx.globalCompositeOperation = 'multiply';
                    
                    // 修正點 3：精確在拍照框範圍內呈現
                    ctx.drawImage(cardImg, rect.x, rect.y, rect.w, rect.h);
                    ctx.restore();

                    if (opacity < 1) {
                        requestAnimationFrame(animateRendering);
                    } else {
                        finalizeAndInjectNativeImage();
                    }
                };
                animateRendering();
            };

            // 備份應急機制：防止 png 遺失
            cardImg.onerror = () => {
                let opacity = 0;
                const rect = getViewfinderRect();
                const animateFallback = () => {
                    opacity += 0.01;
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(bgImg, 0, 0);
                    ctx.save();
                    ctx.globalAlpha = Math.min(opacity, 1);
                    
                    ctx.fillStyle = "#ffffff";
                    ctx.shadowColor = "rgba(0,0,0,0.4)";
                    ctx.shadowBlur = 15;
                    ctx.beginPath();
                    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 16);
                    ctx.fill();
                    
                    ctx.fillStyle = cardName.includes('heart') || cardName.includes('diamond') ? '#dc2626' : '#0f172a';
                    ctx.font = `bold ${rect.w * 0.16}px Arial`;
                    ctx.textAlign = "center";
                    ctx.textBaseline = "middle";
                    ctx.fillText(cardName.split('_')[1].toUpperCase(), rect.x + rect.w/2, rect.y + rect.h/2);
                    ctx.restore();

                    if (opacity < 1) { requestAnimationFrame(animateFallback); } 
                    else { finalizeAndInjectNativeImage(); }
                };
                animateFallback();
            };
        };
    }

    // 轉換為原生 <img> 標籤，開放手機相簿長按儲存權限
    function finalizeAndInjectNativeImage() {
        const finalDataURL = canvas.toDataURL('image/jpeg', 0.95);
        const nativeImg = document.createElement('img');
        nativeImg.src = finalDataURL;
        nativeImg.className = "fixed inset-0 w-full h-full object-cover z-[2000]";
        document.body.appendChild(nativeImg);
    }
</script>

</body>
</html>
