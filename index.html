<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>The Frozen Proof - 時空留痕 (移除遮罩完美對齊版)</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root { --accent: #deff9a; --bg: #000; }
        body { font-family: 'Urbanist', sans-serif; background-color: var(--bg); color: #fff; margin: 0; overflow: hidden; height: 100vh; }
        
        /* 鎖定視窗，避免 iOS 瀏覽器橡皮筋回彈干擾手勢 */
        html, body { position: fixed; width: 100%; height: 100%; overflow: hidden; }

        /* 魔術按鈕樣式 */
        .btn-magic { background: rgba(255,255,255,0.05); border: 1px solid var(--accent); color: var(--accent); padding: 12px 24px; border-radius: 50px; font-weight: 500; transition: all 0.3s; }
        .btn-magic:active { transform: scale(0.95); background: var(--accent); color: #000; }

        /* 全螢幕前置相機預覽 */
        #camera-view { 
            position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 10; 
            transform: scaleX(-1); 
        }

        /* 🌟 核心修正：將原本的 border 40px 及背景色全部移除，改為全透明，徹底解決重疊與視覺干擾 */
        .viewfinder { 
            position: fixed; inset: 0; z-index: 20; 
            background: transparent;
            display: flex; align-items: center;
            pointer-events: none; transition: opacity 0.5s;
        }

        /* 綠色方框：維持 95% 置中顯影尺寸對齊，位於左下角象限中央 */
        .viewfinder-box {
            width: calc(65vw * 0.6666); 
            height: calc(91vw * 0.6666);
            max-width: calc(280px * 0.6666); 
            max-height: calc(392px * 0.6666); 
            border: 2px solid var(--accent); border-radius: 16px;
            box-shadow: 0 0 30px rgba(222, 255, 154, 0.25);
            position: absolute;
            left: 25%;
            top: 75%;
            transform: translate(-50%, -50%); 
        }
        .viewfinder-box::after {
            content: 'LOCKING TIME...'; position: absolute; top: calc(-35px * 0.6666); left: 0; right: 0;
            text-align: center; color: var(--accent); font-size: calc(11px * 0.6666); letter-spacing: calc(4px * 0.6666);
            animation: pulse 1.8s infinite;
        }

        /* 靜態照片渲染畫布 */
        #photo-canvas { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 30; display: none; }
        
        /* 魔術師全螢幕隱形觸控手勢層 */
        #gesture-zone { position: fixed; inset: 0; z-index: 100; display: none; background: rgba(0,0,0,0.01); }

        /* 魔術師大廳 UI */
        #master-ui { 
            position: fixed; inset: 0; z-index: 110; 
            background: #000; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; padding: 40px; text-align: center;
            cursor: pointer;
        }

        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    </style>
</head>
<body>

<video id="camera-view" autoplay playsinline muted></video>

<div id="viewer-ui" class="viewfinder" style="display:none;">
    <div class="viewfinder-box"></div>
    
    <div class="fixed bottom-24 left-3/4 transform -translate-x-1/2 pointer-events-auto">
        <button id="capture-btn" class="btn-magic text-xl px-6 py-4 shadow-xl">
            <i class="fa-solid fa-camera"></i> 
        </button>
    </div>
</div>

<canvas id="photo-canvas"></canvas>

<div id="master-ui" style="display:none;">
    <div id="qrcode-container" class="bg-white p-5 rounded-3xl shadow-2xl">
        <img id="qrcode-img" src="" alt="QR Code" class="w-60 h-60">
    </div>
</div>

<div id="gesture-zone"></div>

<div id="status-dot" style="position: fixed; bottom: 20px; left: 20px; width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.05); z-index: 120; pointer-events: none; transition: background 0.3s;"></div>

<script>
    /** [1] FIREBASE 環境設定 **/
    const firebaseConfig = {
        apiKey: "AIzaSyCjTKS43McbUswz3afjcQpPjamhoMb-X9c",
        authDomain: "magic-card-app-2f24f.firebaseapp.com",
        databaseURL: "https://magic-card-app-2f24f-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "magic-card-app-2f24f",
        storageBucket: "magic-card-app-2f24f.firebasestorage.app",
        messagingSenderId: "900697689478",
        appId: "1:900697689478:web:38a5aba747e96a7fcb3007"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    /** [2] 系統路由與變數定義 **/
    const urlParams = new URLSearchParams(window.location.search);
    const mode = urlParams.get('mode'); 
    const roomFromUrl = urlParams.get('room');
    let currentRoom = roomFromUrl || "";
    let isMaster = (mode === 'master');

    let strokes = [];

    window.onload = () => {
        if (isMaster) {
            setupMasterMode();
        } else if (currentRoom) {
            setupViewerMode(currentRoom);
        } else {
            document.body.innerHTML = `<div class="flex h-screen items-center justify-center p-6 text-center text-white/70">
                <div><i class="fa-solid fa-triangle-exclamation text-4xl text-accent mb-4"></i><br>請使用魔術師生成的 QR Code 掃描開局</div>
            </div>`;
        }
    };

    /** [3] 魔術師控制端邏輯 (Master) **/
    function setupMasterMode() {
        const ui = document.getElementById('master-ui');
        ui.style.display = 'flex';
        document.getElementById('gesture-zone').style.display = 'block';
        
        currentRoom = "9527"; 

        const viewerUrl = `${window.location.origin}${window.location.pathname}?room=${currentRoom}`;
        document.getElementById('qrcode-img').src = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(viewerUrl)}`;

        ui.addEventListener('click', (e) => {
            ui.style.display = 'none';
        });

        window.addEventListener('dblclick', (e) => {
            e.preventDefault();
            e.stopPropagation();
            sendPayloadToFirebase("joker_black");
        });

        initGestureEngine();
    }

    function initGestureEngine() {
        const zone = document.getElementById('gesture-zone');
        const dot = document.getElementById('status-dot');
        let startX, startY;

        zone.addEventListener('touchstart', (e) => {
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
        }, { passive: true });

        zone.addEventListener('touchend', (e) => {
            const endX = e.changedTouches[0].clientX;
            const endY = e.changedTouches[0].clientY;
            
            const dx = endX - startX;
            const dy = endY - startY;
            const dist = Math.sqrt(dx*dx + dy*dy);

            if (dist > 30) {
                const strokeProps = calculateQuadrantStrokeProperties(startX, startY, dx, dy);
                strokes.push(strokeProps);
                
                if (strokes.length === 1) {
                    dot.style.background = 'rgba(222, 255, 154, 0.4)'; 
                } else if (strokes.length === 2) {
                    dot.style.background = 'rgba(255, 255, 255, 0.05)'; 
                    decodeAndSendMagic(strokes);
                    strokes = []; 
                }
            }
        }, { passive: true });
    }

    function calculateQuadrantStrokeProperties(startX, startY, dx, dy) {
        const w = window.innerWidth;
        const h = window.innerHeight;
        
        let startQ = 1;
        if (startX < w / 2 && startY < h / 2) startQ = 1;
        else if (startX >= w / 2 && startY < h / 2) startQ = 2;
        else if (startX >= w / 2 && startY >= h / 2) startQ = 3;
        else if (startX < w / 2 && startY >= h / 2) startQ = 4;

        let edge = 0; 
        let dir = 1;  
        
        const absX = Math.abs(dx);
        const absY = Math.abs(dy);

        if (startQ === 1) {
            if (absX > absY) { edge = 1; dir = (dx > 0) ? 1 : -1; } 
            else             { edge = 0; dir = (dy > 0) ? -1 : 1; } 
        } else if (startQ === 2) {
            if (absX > absY) { edge = 1; dir = (dx > 0) ? 1 : -1; } 
            else             { edge = 2; dir = (dy > 0) ? 1 : -1; } 
        } else if (startQ === 3) {
            if (absX > absY) { edge = 3; dir = (dx < 0) ? 1 : -1; } 
            else             { edge = 2; dir = (dy > 0) ? 1 : -1; } 
        } else if (startQ === 4) {
            if (absX > absY) { edge = 3; dir = (dx < 0) ? 1 : -1; } 
            else             { edge = 0; dir = (dy < 0) ? 1 : -1; } 
        }
        
        return { edge, dir };
    }

    function decodeAndSendMagic(s) {
        let suitIdx = s[0].edge; 
        let isSecondHalf = (s[0].dir === -1); 
        let cardValueOffset = 0;
        
        if (s[1].edge === s[0].edge) {
            cardValueOffset = 12; 
        } else {
            const relQuadrant = (s[1].edge - s[0].edge + 4) % 4; 
            cardValueOffset = (isSecondHalf ? 6 : 0) + (relQuadrant - 1) * 2 + (s[1].dir === 1 ? 0 : 1);
        }
        
        const cardCode = generateCardCode(suitIdx, cardValueOffset);
        sendPayloadToFirebase(cardCode);
    }

    function generateCardCode(suit, valueIdx) {
        const suits = ['club', 'diamond', 'heart', 'spade'];
        const values = ['2', '3', '4', '5', '6', '7', '8', '9', '10', 'jack', 'queen', 'king', '1'];
        return `${suits[suit]}_${values[valueIdx]}`;
    }

    function sendPayloadToFirebase(cardName) {
        db.ref(`twatch_rooms/${currentRoom}`).update({
            forcedCard: cardName,
            timestamp: Date.now()
        });
    }


    /** [4] 觀眾端相機與靜態圖像合成邏輯 (Viewer) **/
    const video = document.getElementById('camera-view');
    const canvas = document.getElementById('photo-canvas');
    const captureBtn = document.getElementById('capture-btn');
    
    let localCapturedRawBase64 = null;
    let isMagicExecuted = false;
    let isCaptured = false;
    let receivedCardName = null;
    let brightnessCheckInterval = null;

    async function setupViewerMode(roomId) {
        document.getElementById('viewer-ui').style.display = 'flex';
        
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: 'user', width: { ideal: 1920 }, height: { ideal: 1080 } }, 
                audio: false 
            });
            video.srcObject = stream;
        } catch (err) {
            alert("請允許網頁相機存取權限，否則無法與心靈感應連線。");
        }

        db.ref(`twatch_rooms/${roomId}`).on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && data.forcedCard) {
                receivedCardName = data.forcedCard;
                checkTriggerCondition(); 
            }
        });

        captureBtn.onclick = () => {
            if ('wakeLock' in navigator) navigator.wakeLock.request('screen').catch(()=>{});
            executeCameraCapture();
        };
    }

    function executeCameraCapture() {
        const dpr = window.devicePixelRatio || 1;
        canvas.width = window.innerWidth * dpr;
        canvas.height = window.innerHeight * dpr;
        const ctx = canvas.getContext('2d');
        
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        
        // 拍照瞬間執行水平翻轉 (使存下來的照片跟自拍預覽完全一樣)
        ctx.translate(canvas.width, 0);
        ctx.scale(-1, 1);
        
        const vW = video.videoWidth;
        const vH = video.videoHeight;
        const canvasRatio = canvas.width / canvas.height;
        const videoRatio = vW / vH;
        
        let dW, dH, sX, sY;
        if (videoRatio > canvasRatio) {
            dH = canvas.height;
            dW = canvas.height * videoRatio;
            sX = (canvas.width - dW) / 2;
            sY = 0;
        } else {
            dW = canvas.width;
            dH = canvas.width / videoRatio;
            sX = 0;
            sY = (canvas.height - dH) / 2;
        }
        
        ctx.drawImage(video, sX, sY, dW, dH);
        localCapturedRawBase64 = canvas.toDataURL('image/jpeg', 0.95);
        ctx.setTransform(1, 0, 0, 1, 0, 0); // 拍照後立刻還原矩陣
        
        // 使用 getBoundingClientRect 精確獲取螢幕上綠色方框（UI 元素）的真實位置與大小
        const boxDom = document.querySelector('.viewfinder-box');
        const boxRect = boxDom.getBoundingClientRect(); 
        
        // 將 UI 方框對應到 Canvas 解析度寬高之中的「比例」並存下來
        const boxDomInfo = {
            domAlignXPercent: boxRect.left * dpr / canvas.width, 
            domAlignYPercent: boxRect.top * dpr / canvas.height, 
            domWidthPercent: boxRect.width * dpr / canvas.width, 
            domHeightPercent: boxRect.height * dpr / canvas.height 
        }
        window.domInfoPercent = boxDomInfo; 
        
        canvas.style.display = 'block';
        document.getElementById('viewer-ui').style.opacity = '0';
        setTimeout(() => document.getElementById('viewer-ui').style.display = 'none', 500);

        isCaptured = true;
        checkTriggerCondition(); 
    }

    function checkTriggerCondition() {
        if (isCaptured && receivedCardName && !isMagicExecuted && !brightnessCheckInterval) {
            
            const lumaCanvas = document.createElement('canvas');
            lumaCanvas.width = 16;
            lumaCanvas.height = 16;
            const lumaCtx = lumaCanvas.getContext('2d');

            brightnessCheckInterval = setInterval(() => {
                if (isMagicExecuted) {
                    clearInterval(brightnessCheckInterval);
                    return;
                }
                try {
                    lumaCtx.drawImage(video, 0, 0, 16, 16);
                    const imgData = lumaCtx.getImageData(0, 0, 16, 16).data;
                    let totalLuminance = 0;
                    
                    for (let i = 0; i < imgData.length; i += 4) {
                        totalLuminance += (0.2126 * imgData[i] + 0.7152 * imgData[i+1] + 0.0722 * imgData[i+2]);
                    }
                    const avgLuminance = totalLuminance / 256;
                    
                    if (avgLuminance < 20) {
                        isMagicExecuted = true;
                        clearInterval(brightnessCheckInterval);
                        
                        if (video.srcObject) {
                            video.srcObject.getTracks().forEach(track => track.stop());
                        }
                        executeVisualSynthesis(receivedCardName);
                    }
                } catch (e) {
                    console.error("光感監測異常:", e);
                }
            }, 200); 
        }
    }

    function executeVisualSynthesis(cardName) {
        const ctx = canvas.getContext('2d');
        const bgImg = new Image();
        bgImg.src = localCapturedRawBase64;
        
        bgImg.onload = () => {
            const cardImg = new Image();
            cardImg.src = `./cards/${cardName}.png`; 
            
            cardImg.onload = () => {
                let opacity = 0;
                const animateRendering = () => {
                    opacity += 0.002; 
                    
                    ctx.setTransform(1, 0, 0, 1, 0, 0); // 每一格都還原矩陣，防止底圖發生二次翻轉
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(bgImg, 0, 0); // 繪製完全不跳動的正向底圖自拍照
                    
                    ctx.save();
                    ctx.globalAlpha = Math.min(opacity, 1);
                    ctx.globalCompositeOperation = 'multiply';
                    
                    // 將撲克牌寬高縮小為綠框的 95%，保留安全的內縮空隙
                    const cardWidth = canvas.width * window.domInfoPercent.domWidthPercent * 0.95; 
                    const cardHeight = canvas.height * window.domInfoPercent.domHeightPercent * 0.95; 
                    
                    // 獲取綠色方框在畫布中的中心點
                    const boxCenterX = canvas.width * (window.domInfoPercent.domAlignXPercent + window.domInfoPercent.domWidthPercent / 2);
                    const boxCenterY = canvas.height * (window.domInfoPercent.domAlignYPercent + window.domInfoPercent.domHeightPercent / 2);
                    
                    // 從中心點反推 95% 卡牌的左上角起點，確保卡牌完美置中於綠色方框內
                    const targetX = boxCenterX - (cardWidth / 2); 
                    const targetY = boxCenterY - (cardHeight / 2); 
                    
                    ctx.drawImage(cardImg, targetX, targetY, cardWidth, cardHeight);
                    ctx.restore();

                    if (opacity < 1) {
                        requestAnimationFrame(animateRendering);
                    } else {
                        finalizeAndInjectNativeImage();
                    }
                };
                animateRendering();
            };

            cardImg.onerror = () => {
                let opacity = 0;
                const animateFallback = () => {
                    opacity += 0.005;
                    
                    ctx.setTransform(1, 0, 0, 1, 0, 0);
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(bgImg, 0, 0);
                    
                    ctx.save();
                    ctx.globalAlpha = Math.min(opacity, 1);
                    
                    // 備用機制同步微調：縮小為 95% 並完美置中
                    const cardWidth = canvas.width * window.domInfoPercent.domWidthPercent * 0.95;
                    const cardHeight = canvas.height * window.domInfoPercent.domHeightPercent * 0.95;
                    
                    const boxCenterX = canvas.width * (window.domInfoPercent.domAlignXPercent + window.domInfoPercent.domWidthPercent / 2);
                    const boxCenterY = canvas.height * (window.domInfoPercent.domAlignYPercent + window.domInfoPercent.domHeightPercent / 2);
                    
                    const targetX = boxCenterX - (cardWidth / 2);
                    const targetY = boxCenterY - (cardHeight / 2);
                    
                    ctx.fillStyle = "#ffffff";
                    ctx.shadowColor = "rgba(0,0,0,0.5)";
                    ctx.shadowBlur = 20;
                    ctx.beginPath();
                    ctx.roundRect(targetX, targetY, cardWidth, cardHeight, 14);
                    ctx.fill();
                    
                    ctx.fillStyle = cardName.includes('heart') || cardName.includes('diamond') ? '#dc2626' : '#0f172a';
                    ctx.font = `bold ${cardWidth * 0.15}px Arial`;
                    ctx.textAlign = "center";
                    ctx.textBaseline = "middle";
                    
                    if (cardName === "joker_black") {
                        ctx.fillStyle = '#1e293b';
                        ctx.fillText("JOKER", targetX + cardWidth/2, targetY + cardHeight/2);
                    } else {
                        ctx.fillText(cardName.split('_')[1].toUpperCase(), targetX + cardWidth/2, targetY + cardHeight/2);
                    }
                    ctx.restore();

                    if (opacity < 1) { requestAnimationFrame(animateFallback); } 
                    else { finalizeAndInjectNativeImage(); }
                };
                animateFallback();
            };
        };
    }

    function finalizeAndInjectNativeImage() {
        const ctx = canvas.getContext('2d');
        ctx.setTransform(1, 0, 0, 1, 0, 0); 
        
        const finalDataURL = canvas.toDataURL('image/jpeg', 0.95);
        const nativeImg = document.createElement('img');
        nativeImg.src = finalDataURL;
        nativeImg.className = "fixed inset-0 w-full h-full object-cover z-[2000]";
        document.body.appendChild(nativeImg);
    }
</script>

</body>
</html>
