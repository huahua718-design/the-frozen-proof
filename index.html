<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>The Frozen Proof - 時空留痕 (終極修正版)</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root { --accent: #deff9a; --bg: #000; }
        body { font-family: 'Urbanist', sans-serif; background-color: var(--bg); color: #fff; margin: 0; overflow: hidden; height: 100vh; }
        
        /* 鎖定視窗，避免 iOS 瀏覽器橡皮筋回彈干擾手勢 */
        html, body { position: fixed; width: 100%; height: 100%; overflow: hidden; }

        /* 魔術按鈕樣式 */
        .btn-magic { background: rgba(0,0,0,0.6); border: 1px solid var(--accent); color: var(--accent); padding: 14px 28px; border-radius: 50px; font-weight: 500; transition: all 0.3s; backdrop-filter: blur(8px); }
        .btn-magic:active { transform: scale(0.95); background: var(--accent); color: #000; }

        /* 全螢幕相機預覽 */
        #camera-view { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 10; }

        /* 科技感瞄準框 UI */
        .viewfinder { 
            position: fixed; inset: 0; z-index: 20; 
            border: 40px solid rgba(0,0,0,0.6); 
            display: flex; align-items: center; justify-content: center;
            pointer-events: none; transition: opacity 0.5s;
        }
        .viewfinder-box {
            width: 65vw; height: 91vw; max-width: 280px; max-height: 392px;
            border: 2px solid var(--accent); border-radius: 16px;
            box-shadow: 0 0 30px rgba(222, 255, 154, 0.25);
            position: relative;
        }
        .viewfinder-box::after {
            content: 'LOCKING TIME...'; position: absolute; top: -35px; left: 0; right: 0;
            text-align: center; color: var(--accent); font-size: 11px; letter-spacing: 4px;
            animation: pulse 1.8s infinite;
        }

        /* 靜態照片渲染畫布 */
        #photo-canvas { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 30; display: none; }
        
        /* 魔術師全螢幕隱形觸控手勢層 */
        #gesture-zone { position: fixed; inset: 0; z-index: 100; display: none; background: rgba(0,0,0,0.01); }

        /* 魔術師大廳 UI */
        #master-ui { 
            position: fixed; inset: 0; z-index: 110; 
            background: #000; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; padding: 40px; text-align: center;
        }

        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        /* 發送成功狀態提示 */
        .toast {
            position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.85); border: 1px solid var(--accent); color: var(--accent);
            padding: 14px 28px; border-radius: 50px; z-index: 200; pointer-events: none;
            opacity: 0; transition: opacity 0.4s; font-size: 14px; letter-spacing: 1px;
            white-space: nowrap; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

<video id="camera-view" autoplay playsinline muted></video>

<div id="viewer-ui" class="viewfinder" style="display:none;">
    <div class="viewfinder-box"></div>
    <div class="fixed bottom-24 left-0 right-0 flex justify-center pointer-events-auto">
        <button id="capture-btn" class="btn-magic text-lg px-10 shadow-lg">
            <i class="fa-solid fa-camera mr-2"></i> 拍下時空定格
        </button>
    </div>
</div>

<canvas id="photo-canvas"></canvas>

<div id="master-ui" style="display:none;">
    <div class="mb-8">
        <h2 class="text-3xl font-bold mb-2">ROOM: <span id="room-id-display" class="text-accent tracking-wider">----</span></h2>
        <p class="text-white/50 text-sm">請引導觀眾掃描下方條碼連線</p>
    </div>
    <div id="qrcode-container" class="bg-white p-5 rounded-3xl mb-8 shadow-2xl">
        <img id="qrcode-img" src="" alt="QR Code" class="w-60 h-60">
    </div>
    <p class="animate-pulse text-accent/80 text-sm tracking-wide">雙擊螢幕：隱藏此畫面 / 開始純黑盲操</p>
</div>

<div id="gesture-zone"></div>

<div id="toast" class="toast"></div>

<script>
    /** [1] FIREBASE 環境設定 **/
    const firebaseConfig = {
        apiKey: "AIzaSyCjTKS43McbUswz3afjcQpPjamhoMb-X9c",
        authDomain: "magic-card-app-2f24f.firebaseapp.com",
        databaseURL: "https://magic-card-app-2f24f-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "magic-card-app-2f24f",
        storageBucket: "magic-card-app-2f24f.firebasestorage.app",
        messagingSenderId: "900697689478",
        appId: "1:900697689478:web:38a5aba747e96a7fcb3007"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    /** [2] 系統路由與變數定義 **/
    const urlParams = new URLSearchParams(window.location.search);
    const mode = urlParams.get('mode'); 
    const roomFromUrl = urlParams.get('room');
    let currentRoom = roomFromUrl || "9527"; // 預設使用 9527 固定房號
    let isMaster = (mode === 'master');

    const EDGE = { LEFT: 0, TOP: 1, RIGHT: 2, BOTTOM: 3 };
    let strokes = [];

    window.onload = () => {
        if (isMaster) {
            // 修正 2: 魔術師端初始化，立即強制關閉並徹底隱藏觀眾端的相機與瞄準框 UI，確保純黑盲操不穿幫
            document.getElementById('camera-view').style.display = 'none';
            document.getElementById('viewer-ui').style.display = 'none';
            
            // 每次重新進入魔術師端時，自動重設資料庫，確保流暢乾淨開局
            db.ref(`twatch_rooms/${currentRoom}`).set({ forcedCard: "", timestamp: 0 });
            setupMasterMode();
        } else {
            setupViewerMode(currentRoom);
        }
    };

    /** [3] 魔術師控制端邏輯 (Master) **/
    function setupMasterMode() {
        document.getElementById('master-ui').style.display = 'flex';
        document.getElementById('gesture-zone').style.display = 'block';
        document.getElementById('room-id-display').innerText = currentRoom;

        const viewerUrl = `${window.location.origin}${window.location.pathname}?room=${currentRoom}`;
        document.getElementById('qrcode-img').src = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(viewerUrl)}`;

        window.addEventListener('dblclick', (e) => {
            e.preventDefault();
            const ui = document.getElementById('master-ui');
            ui.style.display = (ui.style.display === 'flex') ? 'none' : 'flex';
        });

        initGestureEngine();
    }

    function initGestureEngine() {
        const zone = document.getElementById('gesture-zone');
        let startX, startY;

        zone.addEventListener('touchstart', (e) => {
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
        }, { passive: true });

        zone.addEventListener('touchend', (e) => {
            const dx = e.changedTouches[0].clientX - startX;
            const dy = e.changedTouches[0].clientY - startY;
            const dist = Math.sqrt(dx*dx + dy*dy);

            if (dist > 30) {
                const edge = calculateEdgeQuadrant(startX, startY);
                const dir = calculateStrokeDirection(edge, dx, dy);
                
                strokes.push({ edge, dir });
                
                if (strokes.length === 2) {
                    decodeAndSendMagic(strokes);
                    strokes = []; 
                }
            }
        }, { passive: true });
    }

    function calculateEdgeQuadrant(x, y) {
        const w = window.innerWidth, h = window.innerHeight;
        if (x < w * 0.3) return EDGE.LEFT;
        if (y < h * 0.3) return EDGE.TOP;
        if (x > w * 0.7) return EDGE.RIGHT;
        return EDGE.BOTTOM;
    }

    function calculateStrokeDirection(edge, dx, dy) {
        if (edge === EDGE.LEFT) return dy < 0 ? 1 : -1;
        if (edge === EDGE.TOP) return dx > 0 ? 1 : -1;
        if (edge === EDGE.RIGHT) return dy > 0 ? 1 : -1;
        return dx < 0 ? 1 : -1;
    }

    // 🌟 100% 精準對齊您原始的兩筆劃公式
    function decodeAndSendMagic(s) {
        let suitIdx = s[0].edge; 
        let isSecondHalf = (s[0].dir === -1);
        let cardValueOffset = 0;
        
        if (s[1].edge === s[0].edge) {
            cardValueOffset = 12; // 同邊緣雙擊/連續滑動鎖定為 A
        } else {
            const relQuadrant = (s[1].edge - s[0].edge + 4) % 4;
            cardValueOffset = (isSecondHalf ? 6 : 0) + (relQuadrant - 1) * 2 + (s[1].dir === 1 ? 0 : 1);
        }
        
        const suits = ['club', 'diamond', 'heart', 'spade'];
        const values = ['2', '3', '4', '5', '6', '7', '8', '9', '10', 'jack', 'queen', 'king', '1'];
        const cardCode = `${suits[suitIdx]}_${values[cardValueOffset]}`;

        db.ref(`twatch_rooms/${currentRoom}`).update({
            forcedCard: cardCode,
            timestamp: Date.now()
        }).then(() => triggerToast(`<i class="fa-solid fa-wifi mr-2"></i>已成功發送：${cardCode}`));
    }

    function triggerToast(htmlContent) {
        const t = document.getElementById('toast');
        t.innerHTML = htmlContent;
        t.style.opacity = '1';
        setTimeout(() => t.style.opacity = '0', 2000);
    }


    /** [4] 觀眾端相機與圖像顯影邏輯 (Viewer) **/
    const video = document.getElementById('camera-view');
    const canvas = document.getElementById('photo-canvas');
    const captureBtn = document.getElementById('capture-btn');
    
    let pendingCardName = null;
    let localCapturedRawBase64 = null;
    let isMagicExecuted = false;
    let targetRect = null; // 用於存放綠色瞄準框在手機螢幕上的精確絕對 CSS 像素坐標

    async function setupViewerMode(roomId) {
        document.getElementById('viewer-ui').style.display = 'flex';
        
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } }, 
                audio: false 
            });
            video.srcObject = stream;
        } catch (err) {
            alert("請允許開啟相機權限以進行連線。");
        }

        // 實時更新魔術師設定的預言卡牌
        db.ref(`twatch_rooms/${roomId}`).on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && data.forcedCard) {
                pendingCardName = data.forcedCard;
                checkAndTriggerSynthesis(); // 每次 Firebase 更新時主動嘗試檢查
            }
        });

        captureBtn.onclick = () => {
            if ('wakeLock' in navigator) navigator.wakeLock.request('screen').catch(()=>{});
            executeCameraCapture();
        };
    }

    // 模擬 object-fit: cover 的精準 Canvas 重繪算法
    function drawVideoToCanvasCover(ctx, w, h) {
        let videoW = video.videoWidth;
        let videoH = video.videoHeight;
        if (!videoW || !videoH) return;

        let videoRatio = videoW / videoH;
        let screenRatio = w / h;
        let sx, sy, sw, sh;

        if (videoRatio > screenRatio) {
            sh = videoH; sw = sh * screenRatio;
            sx = (videoW - sw) / 2; sy = 0;
        } else {
            sw = videoW; sh = sw / screenRatio;
            sx = 0; sy = (videoH - sh) / 2;
        }
        ctx.drawImage(video, sx, sy, sw, sh, 0, 0, w, h);
    }

    function executeCameraCapture() {
        // 修正 3: 拍照瞬間，利用 getBoundingClientRect 抓取綠色框在手機螢幕上的絕對坐標
        const box = document.querySelector('.viewfinder-box');
        const rect = box.getBoundingClientRect();
        targetRect = {
            x: rect.left,
            y: rect.top,
            w: rect.width,
            h: rect.height
        };

        // 修正 3: 將 Canvas 解析度直接與當前手機螢幕的 CSS 像素寬高 1:1 對齊
        const screenW = window.innerWidth;
        const screenH = window.innerHeight;
        canvas.width = screenW;
        canvas.height = screenH;
        const ctx = canvas.getContext('2d');
        
        drawVideoToCanvasCover(ctx, screenW, screenH);
        localCapturedRawBase64 = canvas.toDataURL('image/jpeg', 0.95);

        // UI 切換
        canvas.style.display = 'block';
        video.style.display = 'none';
        document.getElementById('viewer-ui').style.opacity = '0';
        setTimeout(() => document.getElementById('viewer-ui').style.display = 'none', 500);

        // 關閉鏡頭流
        if (video.srcObject) {
            video.srcObject.getTracks().forEach(track => track.stop());
        }

        checkAndTriggerSynthesis(); // 拍照完成時主動嘗試檢查
    }

    // 修正 3 (核心必殺技): 解除時序死鎖函數
    function checkAndTriggerSynthesis() {
        // 只有在「照片已拍完」且「魔術師已成功發送卡牌」時，才會立刻執行顯影，完美解決不顯影問題
        if (pendingCardName && localCapturedRawBase64 && !isMagicExecuted) {
            isMagicExecuted = true;
            executeVisualSynthesis(pendingCardName);
        }
    }

    function executeVisualSynthesis(cardName) {
        const ctx = canvas.getContext('2d');
        const bgImg = new Image();
        bgImg.src = localCapturedRawBase64;
        
        bgImg.onload = () => {
            const cardImg = new Image();
            cardImg.src = `./cards/${cardName}.png`; 
            
            cardImg.onload = () => {
                let opacity = 0;
                const animateRendering = () => {
                    opacity += 0.003; 
                    
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(bgImg, 0, 0); // 1. 繪製真實背景照片
                    
                    ctx.save();
                    ctx.globalAlpha = Math.min(opacity, 1);
                    ctx.globalCompositeOperation = 'multiply'; // 正片疊底混合
                    
                    // 修正 3: 100% 精準在之前測量好的綠色瞄準框範圍內渲染撲克牌，分毫不差
                    ctx.drawImage(cardImg, targetRect.x, targetRect.y, targetRect.w, targetRect.h);
                    ctx.restore();

                    if (opacity < 1) {
                        requestAnimationFrame(animateRendering);
                    } else {
                        finalizeAndInjectNativeImage();
                    }
                };
                animateRendering();
            };

            // 圖檔遺失防呆應急機制
            cardImg.onerror = () => {
                let opacity = 0;
                const animateFallback = () => {
                    opacity += 0.01;
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(bgImg, 0, 0);
                    ctx.save();
                    ctx.globalAlpha = Math.min(opacity, 1);
                    
                    ctx.fillStyle = "#ffffff";
                    ctx.shadowColor = "rgba(0,0,0,0.4)";
                    ctx.shadowBlur = 15;
                    ctx.beginPath();
                    ctx.roundRect(targetRect.x, targetRect.y, targetRect.w, targetRect.h, 16);
                    ctx.fill();
                    
                    ctx.fillStyle = cardName.includes('heart') || cardName.includes('diamond') ? '#dc2626' : '#0f172a';
                    ctx.font = `bold ${targetRect.w * 0.18}px Arial`;
                    ctx.textAlign = "center";
                    ctx.textBaseline = "middle";
                    ctx.fillText(cardName.split('_')[1].toUpperCase(), targetRect.x + targetRect.w/2, targetRect.y + targetRect.h/2);
                    ctx.restore();

                    if (opacity < 1) { requestAnimationFrame(animateFallback); } 
                    else { finalizeAndInjectNativeImage(); }
                };
                animateFallback();
            };
        };
    }

    function finalizeAndInjectNativeImage() {
        const finalDataURL = canvas.toDataURL('image/jpeg', 0.95);
        const nativeImg = document.createElement('img');
        nativeImg.src = finalDataURL;
        nativeImg.className = "fixed inset-0 w-full h-full object-cover z-[2000]";
        document.body.appendChild(nativeImg);
    }
</script>

</body>
</html>
