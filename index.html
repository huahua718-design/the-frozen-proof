<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>The Frozen Proof - 時空留痕 (四象限終極雙擊版)</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root { --accent: #deff9a; --bg: #000; }
        body { font-family: 'Urbanist', sans-serif; background-color: var(--bg); color: #fff; margin: 0; overflow: hidden; height: 100vh; }
        
        /* 鎖定視窗，避免 iOS 瀏覽器橡皮筋回彈干擾手勢 */
        html, body { position: fixed; width: 100%; height: 100%; overflow: hidden; }

        /* 魔術按鈕樣式 */
        .btn-magic { background: rgba(255,255,255,0.05); border: 1px solid var(--accent); color: var(--accent); padding: 14px 28px; border-radius: 50px; font-weight: 500; transition: all 0.3s; }
        .btn-magic:active { transform: scale(0.95); background: var(--accent); color: #000; }

        /* 全螢幕相機預覽 */
        #camera-view { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 10; }

        /* 科技感瞄準框 UI */
        .viewfinder { 
            position: fixed; inset: 0; z-index: 20; 
            border: 40px solid rgba(0,0,0,0.6); 
            display: flex; align-items: center; justify-content: center;
            pointer-events: none; transition: opacity 0.5s;
        }
        .viewfinder-box {
            width: 65vw; height: 91vw; max-width: 280px; max-height: 392px;
            border: 2px solid var(--accent); border-radius: 16px;
            box-shadow: 0 0 30px rgba(222, 255, 154, 0.25);
            position: relative;
        }
        .viewfinder-box::after {
            content: 'LOCKING TIME...'; position: absolute; top: -35px; left: 0; right: 0;
            text-align: center; color: var(--accent); font-size: 11px; letter-spacing: 4px;
            animation: pulse 1.8s infinite;
        }

        /* 靜態照片渲染畫布 */
        #photo-canvas { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 30; display: none; }
        
        /* 魔術師全螢幕隱形觸控手勢層 */
        #gesture-zone { position: fixed; inset: 0; z-index: 100; display: none; background: rgba(0,0,0,0.01); }

        /* 魔術師大廳 UI */
        #master-ui { 
            position: fixed; inset: 0; z-index: 110; 
            background: #000; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; padding: 40px; text-align: center;
            cursor: pointer;
        }

        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        /* 發送成功狀態提示 */
        .toast {
            position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.85); border: 1px solid var(--accent); color: var(--accent);
            padding: 12px 24px; border-radius: 50px; z-index: 200; pointer-events: none;
            opacity: 0; transition: opacity 0.3s; font-size: 14px; letter-spacing: 1px;
        }
    </style>
</head>
<body>

<video id="camera-view" autoplay playsinline muted></video>

<div id="viewer-ui" class="viewfinder" style="display:none;">
    <div class="viewfinder-box"></div>
    <div class="fixed bottom-24 left-0 right-0 flex justify-center pointer-events-auto">
        <button id="capture-btn" class="btn-magic text-lg px-10 shadow-lg">
            <i class="fa-solid fa-camera mr-2"></i> 拍下時空定格
        </button>
    </div>
</div>

<canvas id="photo-canvas"></canvas>

<div id="master-ui" style="display:none;">
    <div class="mb-8">
        <h2 class="text-3xl font-bold mb-2">ROOM: <span id="room-id-display" class="text-accent tracking-wider">----</span></h2>
        <p class="text-white/50 text-sm">請引導觀眾掃描下方條碼連線</p>
    </div>
    <div id="qrcode-container" class="bg-white p-5 rounded-3xl mb-8 shadow-2xl">
        <img id="qrcode-img" src="" alt="QR Code" class="w-60 h-60">
    </div>
    <p class="animate-pulse text-accent/80 text-sm tracking-wide">【點擊任意處】：隱藏此畫面開始盲操</p>
    <p class="text-white/40 text-xs mt-2">【任何時候雙擊】：直接強制選擇黑鬼牌 (Joker)</p>
</div>

<div id="gesture-zone"></div>

<div id="toast" class="toast"><i class="fa-solid fa-wifi mr-2"></i>思想密碼已同步</div>

<script>
    /** [1] FIREBASE 環境設定 **/
    const firebaseConfig = {
        apiKey: "AIzaSyCjTKS43McbUswz3afjcQpPjamhoMb-X9c",
        authDomain: "magic-card-app-2f24f.firebaseapp.com",
        databaseURL: "https://magic-card-app-2f24f-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "magic-card-app-2f24f",
        storageBucket: "magic-card-app-2f24f.firebasestorage.app",
        messagingSenderId: "900697689478",
        appId: "1:900697689478:web:38a5aba747e96a7fcb3007"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    /** [2] 系統路由與變數定義 **/
    const urlParams = new URLSearchParams(window.location.search);
    const mode = urlParams.get('mode'); 
    const roomFromUrl = urlParams.get('room');
    let currentRoom = roomFromUrl || "";
    let isMaster = (mode === 'master');

    let strokes = [];

    window.onload = () => {
        if (isMaster) {
            setupMasterMode();
        } else if (currentRoom) {
            setupViewerMode(currentRoom);
        } else {
            document.body.innerHTML = `<div class="flex h-screen items-center justify-center p-6 text-center text-white/70">
                <div><i class="fa-solid fa-triangle-exclamation text-4xl text-accent mb-4"></i><br>請使用魔術師生成的 QR Code 掃描開局</div>
            </div>`;
        }
    };

    /** [3] 魔術師控制端邏輯 (Master) **/
    function setupMasterMode() {
        const ui = document.getElementById('master-ui');
        ui.style.display = 'flex';
        document.getElementById('gesture-zone').style.display = 'block';
        
        currentRoom = "9527";
        document.getElementById('room-id-display').innerText = currentRoom;

        const viewerUrl = `${window.location.origin}${window.location.pathname}?room=${currentRoom}`;
        document.getElementById('qrcode-img').src = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(viewerUrl)}`;

        // 🌟 優化 1：單擊大廳任何地方就收起大廳，不干擾雙擊
        ui.addEventListener('click', (e) => {
            ui.style.display = 'none';
        });

        // 🌟 優化 2：全螢幕雙擊監聽 ＝ 絕對強制觸發黑鬼牌 (joker_black)
        window.addEventListener('dblclick', (e) => {
            e.preventDefault();
            e.stopPropagation();
            sendPayloadToFirebase("joker_black");
        });

        initGestureEngine();
    }

    // 初始化雙筆劃盲操感應器
    function initGestureEngine() {
        const zone = document.getElementById('gesture-zone');
        let startX, startY;

        zone.addEventListener('touchstart', (e) => {
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
        }, { passive: true });

        zone.addEventListener('touchend', (e) => {
            const endX = e.changedTouches[0].clientX;
            const endY = e.changedTouches[0].clientY;
            
            const dx = endX - startX;
            const dy = endY - startY;
            const dist = Math.sqrt(dx*dx + dy*dy);

            // 滑動距離大於 30 像素才判定為有效筆劃
            if (dist > 30) {
                // 十字四象限物理感應引擎
                const strokeProps = calculateQuadrantStrokeProperties(startX, startY, dx, dy);
                strokes.push(strokeProps);
                
                if (strokes.length === 2) {
                    decodeAndSendMagic(strokes);
                    strokes = []; // 清空等待下次輸入
                }
            }
        }, { passive: true });
    }

    // 精準對齊您的四象限對照邏輯
    function calculateQuadrantStrokeProperties(startX, startY, dx, dy) {
        const w = window.innerWidth;
        const h = window.innerHeight;
        
        // 1. 判定起點處於哪一個象限 (1:左上, 2:右上, 3:右下, 4:左下)
        let startQ = 1;
        if (startX < w / 2 && startY < h / 2) startQ = 1;
        else if (startX >= w / 2 && startY < h / 2) startQ = 2;
        else if (startX >= w / 2 && startY >= h / 2) startQ = 3;
        else if (startX < w / 2 && startY >= h / 2) startQ = 4;

        let edge = 0; // 對應內部的花色通道 (0:左梅花, 1:上方塊, 2:右紅心, 3:下黑桃)
        let dir = 1;  // 滑動物理方向 (1:順時針正向 2-7, -1:逆時針反向 8-K)
        
        const absX = Math.abs(dx);
        const absY = Math.abs(dy);

        // 2. 依據起點象限及滑動主導軸向，精準對齊您的 4-1, 1-4, 1-2 等全部 8 種公式
        if (startQ === 1) {
            if (absX > absY) { edge = 1; dir = (dx > 0) ? 1 : -1; } 
            else             { edge = 0; dir = (dy > 0) ? -1 : 1; } 
        } else if (startQ === 2) {
            if (absX > absY) { edge = 1; dir = (dx > 0) ? 1 : -1; } 
            else             { edge = 2; dir = (dy > 0) ? 1 : -1; } 
        } else if (startQ === 3) {
            if (absX > absY) { edge = 3; dir = (dx < 0) ? 1 : -1; } 
            else             { edge = 2; dir = (dy > 0) ? 1 : -1; } 
        } else if (startQ === 4) {
            if (absX > absY) { edge = 3; dir = (dx < 0) ? 1 : -1; } 
            else             { edge = 0; dir = (dy < 0) ? 1 : -1; } 
        }
        
        return { edge, dir };
    }

    function decodeAndSendMagic(s) {
        let suitIdx = s[0].edge; // 0梅, 1方, 2紅, 3黑
        let isSecondHalf = (s[0].dir === -1); // 順時針前半段, 逆時針後半段
        
        let cardValueOffset = 0;
        
        if (s[1].edge === s[0].edge) {
            cardValueOffset = 12; // 同象限/同邊緣滑動：直接鎖定為「 A 」
        } else {
            const relQuadrant = (s[1].edge - s[0].edge + 4) % 4; // 計算相對象限距離
            cardValueOffset = (isSecondHalf ? 6 : 0) + (relQuadrant - 1) * 2 + (s[1].dir === 1 ? 0 : 1);
        }
        
        const cardCode = generateCardCode(suitIdx, cardValueOffset);
        sendPayloadToFirebase(cardCode);
    }

    function generateCardCode(suit, valueIdx) {
        const suits = ['club', 'diamond', 'heart', 'spade'];
        const values = ['2', '3', '4', '5', '6', '7', '8', '9', '10', 'jack', 'queen', 'king', '1'];
        return `${suits[suit]}_${values[valueIdx]}`;
    }

    function sendPayloadToFirebase(cardName) {
        db.ref(`twatch_rooms/${currentRoom}`).update({
            forcedCard: cardName,
            timestamp: Date.now()
        }).then(() => triggerToast(cardName));
    }

    function triggerToast(cardName) {
        const t = document.getElementById('toast');
        t.innerHTML = `<i class="fa-solid fa-wifi mr-2"></i>已強制同步：${cardName.toUpperCase()}`;
        t.style.opacity = '1';
        setTimeout(() => t.style.opacity = '0', 1500);
    }


    /** [4] 觀眾端相機與靜態圖像合成邏輯 (Viewer) **/
    const video = document.getElementById('camera-view');
    const canvas = document.getElementById('photo-canvas');
    const captureBtn = document.getElementById('capture-btn');
    let localCapturedRawBase64 = null;
    let isMagicExecuted = false;

    async function setupViewerMode(roomId) {
        document.getElementById('viewer-ui').style.display = 'flex';
        
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } }, 
                audio: false 
            });
            video.srcObject = stream;
        } catch (err) {
            alert("請允許網頁相機存取權限，否則無法與心靈感應連線。");
        }

        db.ref(`twatch_rooms/${roomId}`).on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && data.forcedCard && localCapturedRawBase64 && !isMagicExecuted) {
                isMagicExecuted = true;
                executeVisualSynthesis(data.forcedCard);
            }
        });

        captureBtn.onclick = () => {
            if ('wakeLock' in navigator) navigator.wakeLock.request('screen').catch(()=>{});
            executeCameraCapture();
        };
    }

    function executeCameraCapture() {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        localCapturedRawBase64 = canvas.toDataURL('image/jpeg', 0.95);
        
        canvas.style.display = 'block';
        video.style.display = 'none';
        document.getElementById('viewer-ui').style.opacity = '0';
        setTimeout(() => document.getElementById('viewer-ui').style.display = 'none', 500);

        if (video.srcObject) {
            video.srcObject.getTracks().forEach(track => track.stop());
        }
        
        db.ref(`twatch_rooms/${currentRoom}`).once('value', (snapshot) => {
            const data = snapshot.val();
            if (data && data.forcedCard && !isMagicExecuted) {
                isMagicExecuted = true;
                executeVisualSynthesis(data.forcedCard);
            }
        });
    }

    function executeVisualSynthesis(cardName) {
        const ctx = canvas.getContext('2d');
        const bgImg = new Image();
        bgImg.src = localCapturedRawBase64;
        
        bgImg.onload = () => {
            const cardImg = new Image();
            cardImg.src = `./cards/${cardName}.png`; 
            
            cardImg.onload = () => {
                let opacity = 0;
                const animateRendering = () => {
                    opacity += 0.002; 
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(bgImg, 0, 0);
                    
                    ctx.save();
                    ctx.globalAlpha = Math.min(opacity, 1);
                    ctx.globalCompositeOperation = 'multiply';
                    
                    const cardWidth = canvas.width * 0.42; 
                    const cardHeight = cardWidth * 1.42; 
                    const targetX = (canvas.width - cardWidth) / 2;
                    const targetY = (canvas.height - cardHeight) / 2;
                    
                    ctx.drawImage(cardImg, targetX, targetY, cardWidth, cardHeight);
                    ctx.restore();

                    if (opacity < 1) {
                        requestAnimationFrame(animateRendering);
                    } else {
                        finalizeAndInjectNativeImage();
                    }
                };
                animateRendering();
            };

            cardImg.onerror = () => {
                let opacity = 0;
                const animateFallback = () => {
                    opacity += 0.005;
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(bgImg, 0, 0);
                    ctx.save();
                    ctx.globalAlpha = Math.min(opacity, 1);
                    
                    const cardWidth = canvas.width * 0.42;
                    const cardHeight = cardWidth * 1.42;
                    const targetX = (canvas.width - cardWidth) / 2;
                    const targetY = (canvas.height - cardHeight) / 2;
                    
                    ctx.fillStyle = "#ffffff";
                    ctx.shadowColor = "rgba(0,0,0,0.5)";
                    ctx.shadowBlur = 20;
                    ctx.beginPath();
                    ctx.roundRect(targetX, targetY, cardWidth, cardHeight, 16);
                    ctx.fill();
                    
                    ctx.fillStyle = cardName.includes('heart') || cardName.includes('diamond') ? '#dc2626' : '#0f172a';
                    ctx.font = `bold ${cardWidth * 0.2}px Arial`;
                    ctx.textAlign = "center";
                    ctx.textBaseline = "middle";
                    
                    // 鬼牌文字優化顯示
                    if (cardName === "joker_black") {
                        ctx.fillStyle = '#1e293b';
                        ctx.fillText("JOKER", targetX + cardWidth/2, targetY + cardHeight/2);
                    } else {
                        ctx.fillText(cardName.split('_')[1].toUpperCase(), targetX + cardWidth/2, targetY + cardHeight/2);
                    }
                    ctx.restore();

                    if (opacity < 1) { requestAnimationFrame(animateFallback); } 
                    else { finalizeAndInjectNativeImage(); }
                };
                animateFallback();
            };
        };
    }

    function finalizeAndInjectNativeImage() {
        const finalDataURL = canvas.toDataURL('image/jpeg', 0.95);
        const nativeImg = document.createElement('img');
        nativeImg.src = finalDataURL;
        nativeImg.className = "fixed inset-0 w-full h-full object-cover z-[2000]";
        document.body.appendChild(nativeImg);
    }
</script>

</body>
</html>
